<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexabon Order</title>

  <!-- শুধুমাত্র ১টি ফন্ট যা ফোনে ফাস্ট লোড হয় -->
  <link href="https://googleapis.com" rel="stylesheet">
  
  <style>
    /* ইন্টারনাল CSS: কোনো ফাইল খুঁজতে হবে না, তাই ফাস্ট */
    body { background-color: #fdfbf7; font-family: 'Plus Jakarta Sans', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 15px; }
    .luxury-card { width: 100%; max-width: 400px; background: #fff; padding: 25px; border-radius: 15px; box-shadow: 0 5px 25px rgba(0,0,0,0.03); border: 1px solid #eee5d9; }
    .home-link { display: block; color: #1a5928; text-decoration: none; font-size: 11px; font-weight: 800; margin-bottom: 20px; text-transform: uppercase; }
    .header-section h2 { color: #1a5928; font-weight: 800; margin: 0; text-align: center; font-size: 24px; }
    .form-label { font-weight: 700; color: #444; font-size: 11px; margin-top: 15px; display: block; text-transform: uppercase; }
    .form-control { width: 100%; border-radius: 8px; border: 1px solid #ddd; padding: 12px; font-size: 14px; box-sizing: border-box; margin-top: 5px; background: #fafafa; }
    .btn-submit { background-color: #1a5928; color: white; font-weight: bold; border: none; width: 100%; padding: 15px; border-radius: 8px; font-size: 15px; margin-top: 20px; cursor: pointer; text-transform: uppercase; }
  </style>
</head>
<body>

<div class="luxury-card">
  <a href="https://azimm7337-cmyk.github.io/NexabonFashion/homepage.html" class="home-link">← Back to Homepage</a>

  <div class="header-section">
    <h2>মেগা অফার</h2>
    <p style="text-align: center; font-size: 12px; color: #888;">সঠিক তথ্য দিয়ে অর্ডারটি সম্পন্ন করুন</p>
  </div>

  <form name="submit-to-google-sheet">
    <label class="form-label">প্রোডাক্ট পছন্দ করুন:</label>
    <select name="Product_Choice" class="form-control" required>
      <option value="Drop shoulder">Drop shoulder - ৫০০৳</option>
      <option value="Waffle Knit">Waffle Knit - ৬৫০৳</option>
      <option value="Oversized Tee">Oversized Tee - ৫০০৳</option>
    </select>

    <label class="form-label">আপনার নাম:</label>
    <input type="text" name="Customer_Name" class="form-control" required>

    <label class="form-label">মোবাইল নম্বর:</label>
    <input type="tel" name="Phone_Number" class="form-control" required>

    <label class="form-label">ঠিকানা:</label>
    <textarea name="Shipping_Address" class="form-control" style="height: 60px;" required></textarea>

    <button type="submit" id="submitBtn" class="btn-submit">অর্ডার কনফার্ম করুন</button>
  </form>
</div>

<script>
  const scriptURL = 'https://script.google.com/macros/s/AKfycbx-LYxlKVyJHnHL_l5vVDSEo5zGwL7wg8daAEcj9VA2kLaameHEPXkVE8vYMyln1NOW/exec'; 
  const form = document.forms['submit-to-google-sheet'];
  const btn = document.getElementById('submitBtn');

  form.addEventListener('submit', e => {
    e.preventDefault();
    btn.disabled = true;
    btn.innerHTML = "প্রসেসিং...";

    // ডাটা পাঠানো (গুগল থেকে উত্তর আসার আগেই পেজ বদল হবে)
    fetch(scriptURL, { method: 'POST', body: new FormData(form), mode: 'no-cors' });

    setTimeout(() => {
        window.location.href = "https://azimm7337-cmyk.github.io/NexabonFashion/thanks.html";
    }, 400); // মাত্র ০.৪ সেকেন্ডে রিডাইরেক্ট হবে
  });
</script>

</body>
</html>

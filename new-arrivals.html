<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Arrivals | Nexabonfashion</title>
    <script src="https://tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        @import url('https://googleapis.com');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fdfbf7; color: #1a1a1a; margin: 0; }
        
        .product-img-container img { transition: transform 1.2s cubic-bezier(0.19, 1, 0.22, 1); }
        .product-card:hover img { transform: scale(1.08); }
        
        /* Button Reveal Animation */
        .order-btn-overlay {
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .product-card:hover .order-btn-overlay { transform: translateY(0); }
    </style>
</head>
<body>

    <!-- Nav -->
    <nav class="bg-[#fdfbf7]/90 backdrop-blur-md sticky top-0 z-50 border-b border-[#eee5d9] py-6 px-8">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="https://azimm7337-cmyk.github.io/NexabonFashion/homepage.html" class="text-[10px] font-bold tracking-[3px] uppercase hover:text-[#c4a484] transition">← Back Home</a>
            <div class="text-xl font-black tracking-[5px] uppercase">NEXABON</div>
            <div class="w-20"></div> <!-- Spacer for balance -->
        </div>
    </nav>

    <!-- Header -->
    <header class="max-w-7xl mx-auto pt-16 pb-10 px-8 text-center">

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-x-10 gap-y-16">
            
            <!-- Product 1 -->
            <div class="product-card group">
                <div class="product-img-container relative aspect-[3/4] overflow-hidden bg-[#f4f1ea]">
                    <img src="https://unsplash.com" class="w-full h-full object-cover">
                    
                    <!-- Link to your other site -->
                    <div class="absolute bottom-0 left-0 right-0 p-4 order-btn-overlay">
                        <a href="https://azimm7337-cmyk.github.io/NexabonFashion/index.html" target="_blank" class="w-full bg-white text-black py-4 text-[10px] font-black uppercase tracking-[2px] hover:bg-black hover:text-white transition duration-300 block text-center shadow-2xl">
                            Purchase Now →
                        </a>
                    </div>
                </div>
                <div class="mt-6 flex justify-between items-start">
                    <div class="space-y-1">
                        <h3 class="text-[11px] font-bold uppercase tracking-[2px]">Waffle Knit - Sand</h3>
                        <p class="text-[9px] text-gray-400 uppercase font-bold tracking-widest">Premium Texture</p>
                    </div>
                    <span class="text-sm font-black text-[#c4a484]">৳১,৪৫০</span>
                </div>
            </div>

            <!-- Product 2 -->
            <div class="product-card group">
                <div class="product-img-container relative aspect-[3/4] overflow-hidden bg-[#f4f1ea]">
                    <img src="https://unsplash.com" class="w-full h-full object-cover">
                    
                    <div class="absolute bottom-0 left-0 right-0 p-4 order-btn-overlay">
                        <a href="আপনার-অর্ডার-পেজ-লিঙ্ক-২" target="_blank" class="w-full bg-white text-black py-4 text-[10px] font-black uppercase tracking-[2px] hover:bg-black hover:text-white transition duration-300 block text-center shadow-2xl">
                            Purchase Now →
                        </a>
                    </div>
                </div>
                <div class="mt-6 flex justify-between items-start">
                    <div class="space-y-1">
                        <h3 class="text-[11px] font-bold uppercase tracking-[2px]">Classic Drop Shoulder</h3>
                        <p class="text-[9px] text-gray-400 uppercase font-bold tracking-widest">Minimalist Fit</p>
                    </div>
                    <span class="text-sm font-black text-[#c4a484]">৳১,২৫০</span>
                </div>
            </div>

            <!-- Product 3 -->
            <div class="product-card group">
                <div class="product-img-container relative aspect-[3/4] overflow-hidden bg-[#f4f1ea]">
                    <img src="https://unsplash.com" class="w-full h-full object-cover">
                    
                    <div class="absolute bottom-0 left-0 right-0 p-4 order-btn-overlay">
                        <a href="আপনার-অর্ডার-পেজ-লিঙ্ক-৩" target="_blank" class="w-full bg-white text-black py-4 text-[10px] font-black uppercase tracking-[2px] hover:bg-black hover:text-white transition duration-300 block text-center shadow-2xl">
                            Purchase Now →
                        </a>
                    </div>
                </div>
                <div class="mt-6 flex justify-between items-start">
                    <div class="space-y-1">
                        <h3 class="text-[11px] font-bold uppercase tracking-[2px]">Oversized Tee - Onyx</h3>

                    </div>
                    <span class="text-sm font-black text-[#c4a484]">৳১,৫৫০</span>
                </div>
            </div>

        </div>
    </section>

    <!-- Footer -->
    <footer class="border-t border-[#eee5d9] py-12 text-center text-gray-400 text-[9px] tracking-[3px] uppercase">
        &copy; 2026 NEXABON FASHION BANGLADESH
    </footer>

</body>
</html>

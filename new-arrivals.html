<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New Arrivals | Nexabonfashion</title>

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Font -->
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background-color: #faf8f3;
    color: #111;
}

/* Image hover */
.product-card img {
    transition: transform 0.8s cubic-bezier(0.19,1,0.22,1);
}
.product-card:hover img {
    transform: scale(1.06);
}

/* Overlay button */
.order-btn-overlay {
    transform: translateY(100%);
    transition: all 0.4s ease;
}
.product-card:hover .order-btn-overlay {
    transform: translateY(0);
}
</style>
</head>

<body>

<!-- NAV -->
<nav class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-gray-200 py-5 px-6">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
        <a href="https://azimm7337-cmyk.github.io/NexabonFashion/homepage.html" class="text-xs font-semibold tracking-widest uppercase hover:text-[#c4a484] transition">
            ← Back Home
        </a>

        <div class="text-lg font-extrabold tracking-[6px] uppercase">
            NEXABON
        </div>

    </div>
</nav>

<header class="max-w-6xl mx-auto pt-16 pb-10 px-6 text-center">

                        Purchase Now →

            <div class="mt-4 flex justify-between items-center">

                    </h3>

                <div class="absolute bottom-0 left-0 right-0 p-4 order-btn-overlay">
                    <a href="https://azimm7337-cmyk.github.io/NexabonFashion/index.html" class="block text-center bg-black text-white py-3 text-xs font-bold tracking-widest rounded-lg hover:bg-[#c4a484] transition">

                    </a>

            </div>

            <div class="mt-4 flex justify-between items-center">
                <div>

                        Classic Drop Shoulder
                    </h3>
                    <p class="text-xs text-gray-400 uppercase">

                <span class="text-sm font-bold text-[#c4a484]">
                    ৳৬০০

                        Purchase Now →
                    </a>
                </div>
            </div>

            <div class="mt-4 flex justify-between items-center">

                    <h3 class="text-sm font-semibold uppercase tracking-wide">

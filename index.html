<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Perfume Offer - Mega Ramadan</title>

  <!-- Bootstrap CSS (সঠিক লিঙ্ক) -->
  <link href="https://jsdelivr.net" rel="stylesheet" />
  <!-- Select2 CSS (সঠিক লিঙ্ক) -->
  <link href="https://jsdelivr.net" rel="stylesheet" />

  <style>
    .select2-container{box-sizing:border-box;display:inline-block;margin:0;position:relative;vertical-align:middle}.select2-container .select2-selection--single{box-sizing:border-box;cursor:pointer;display:block;height:38px;user-select:none;-webkit-user-select:none}.select2-container .select2-selection--single .select2-selection__rendered{display:block;padding-left:8px;padding-right:20px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.select2-container--default .select2-selection--single{background-color:#fff;border:1px solid #aaa;border-radius:4px}.select2-container--default .select2-selection--single .select2-selection__rendered{color:#444;line-height:34px}
    
    body { background-color: #f4f4f4; padding: 20px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    .order-box { max-width: 500px; margin: 0 auto; background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
    .btn-whatsapp { background-color: #25D366; color: white; font-weight: bold; border: none; width: 100%; padding: 12px; border-radius: 6px; margin-top: 20px; cursor: pointer;}
    .btn-whatsapp:hover { background-color: #128C7E; color: white; }
    label { font-weight: 600; margin-bottom: 5px; display: block; color: #333; }
  </style>
</head>
<body>

<div class="order-box">
  <h2 class="text-center text-success mb-4">🌙 মেগা রমজান অফার</h2>
  <p class="text-center text-muted mb-4">নিচের ফর্মটি পূরণ করে অর্ডার করুন</p>

  <form id="perfumeOrderForm">
    <div class="mb-3">
      <label>পারফিউম সিলেক্ট করুন:</label>
      <select id="perfume_choice" class="js-example-basic-single form-control" style="width: 100%;">
        <option value="">পছন্দ করুন...</option>
        <option value="Oud Al Layl">Oud Al Layl - ১২৫০৳</option>
        <option value="Sheikh Al Shuyukh">Sheikh Al Shuyukh - ১৩৫০৳</option>
        <option value="White Musk">White Musk - ৮৫০৳</option>
      </select>
    </div>

    <div class="mb-3">
      <label>আপনার নাম:</label>
      <input type="text" id="cust_name" class="form-control" placeholder="আপনার নাম লিখুন">
    </div>

    <div class="mb-3">
      <label>মোবাইল নম্বর:</label>
      <input type="tel" id="cust_phone" class="form-control" placeholder="০১৭XXXXXXXX">
    </div>

    <div class="mb-3">
      <label>ঠিকানা:</label>
      <textarea id="cust_address" class="form-control" rows="3" placeholder="পূর্ণ ঠিকানা লিখুন"></textarea>
    </div>

    <button type="button" onclick="sendToWhatsApp()" class="btn-whatsapp">
       WhatsApp এ অর্ডার দিন
    </button>
  </form>
</div>

<!-- সঠিক স্ক্রিপ্ট লিঙ্কসমূহ -->
<script src="https://jquery.com"></script>
<script src="https://jsdelivr.net"></script>

<script>
  $(document).ready(function() {
    $('.js-example-basic-single').select2();
  });

  function sendToWhatsApp() {
    // এখানে আপনার নিজের নম্বর দিন
    const myNumber = "8801970839802"; 

    const perfume = $('#perfume_choice').val();
    const name = $('#cust_name').val();
    const phone = $('#cust_phone').val();
    const address = $('#cust_address').val();

    if (!perfume || !name || !phone || !address) {
      alert("দয়া করে সব তথ্য পূরণ করুন!");
      return;
    }

    const message = `*নতুন অর্ডার (রমজান অফার)*%0A` +
                    `-----------------------%0A` +
                    `📦 *পণ্য:* ${perfume}%0A` +
                    `👤 *নাম:* ${name}%0A` +
                    `📞 *ফোন:* ${phone}%0A` +
                    `📍 *ঠিকানা:* ${address}`;

    // সঠিক URL ফরম্যাট
    const url = `https://wa.me{myNumber}?text=${message}`;
    window.open(url, '_blank').focus();
  }
</script>

</body>
</html>

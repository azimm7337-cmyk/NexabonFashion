<!DOCTYPE html>
<html lang="en">
    <head>
      <meta charset="UTF-8">
      <title>testing</title>
      <style>
        #huh{
          color:blue;

      </style>
    </head>
    <body>
        
         <form>
          <div>
            <label for="fullname">Fullname:</label>
            <input type="text" name="fullname">
          </div><br>
          <div>
            <label for="email">Email:</label>
            <input type="email" name="email">
          </div><br>
          <div>
            <label for="password">Password</label>
            <input type="password" name="password">
          </div><br>
          <div>
            <label for="dob">Date of Birth:</label>
            <input type="date" name="dob">
          </div><br>
          <div>
            <label for="photo">Choose your photo:</label>
            <input type="file" name="photo">
          </div><br>
          <div>
            <label for="gender">Gender:</label>
            <input type="radio" name="gender" value="male">Male
            <input type="radio" name="gender" value="female">Female
          </div><br>
          <div>
            <label for="religion">Religion:</label>
            <input type="checkbox" name="religion" value="islam">Islam
            <input type="checkbox" name="religion" value="hindu">hindu
          </div><br>
          <div>
            <label for="department">Department</label>
            <select name="department">
              <option value="cse">CSE</option>
              <option value="eee" selected>EEE</option>
              <option value="lle">LLB</option>
            </select>
          </div><br>
          <div>
            <label for="message">Message</label>
            <textarea cols="5" rows="3"></textarea>
          </div><br>
          <div>
            <input type="submit" value="Register">
            <input type="reset" value="Clear">
          </div>
         </form>
         Muslims <progress min="0" max="100" value="91"></progress>
         Hindus <progress min="0" max="100" value="7"></progress>
         Buddhists <progress min="0" max="100" value="1"></progress>

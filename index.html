<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexabon Fashion | Checkout</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
    --green:#0b3d2e;
    --green2:#146c4f;
    --bg:#f4f7f5;
}

body{
    margin:0;
    font-family:Inter,sans-serif;
    background:var(--bg);
}

/* TOP BAR */
.topbar{
    background:linear-gradient(135deg,var(--green),var(--green2));
    color:#fff;
    padding:12px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.topbar a{
    color:#fff;
    text-decoration:none;
    font-weight:600;
}

/* LAYOUT */
.wrapper{
    max-width:1100px;
    margin:30px auto;
    display:grid;
    grid-template-columns:1.5fr 1fr;
    gap:20px;
    padding:15px;
}

/* CARD */
.card{
    background:#fff;
    padding:25px;
    border-radius:16px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

/* PRODUCT */
.product-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    max-height:250px;
    overflow:auto;
}

.product{
    display:flex;
    gap:10px;
    padding:10px;
    border:1px solid #eee;
    border-radius:12px;
    cursor:pointer;
    align-items:center;
    transition:.2s;
}

.product:hover{
    transform:scale(1.02);
    border-color:var(--green);
}

.product.active{
    border:2px solid var(--green);
    background:#eef6f2;
}

.product img{
    width:50px;
    height:50px;
    border-radius:10px;
    object-fit:cover;
}

/* INPUT */
input,select{
    width:100%;
    padding:10px;
    margin-top:6px;
    border-radius:10px;
    border:1px solid #ddd;
}

/* BUTTON */
button{
    width:100%;
    padding:12px;
    margin-top:15px;
    background:var(--green);
    color:#fff;
    border:none;
    border-radius:12px;
    font-weight:700;
    cursor:pointer;
}

/* SUMMARY */
.summary{
    font-size:14px;
    line-height:1.8;
}

.total{
    margin-top:15px;
    font-size:18px;
    font-weight:700;
}

@media(max-width:900px){
.wrapper{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<div class="topbar">
<a href="https://azimm7337-cmyk.github.io/NexabonFashion/homepage.html">🏠 Home</a>
<div>
📞 <a href="tel:01575849104">Call</a> |
<a href="https://wa.me/8801575849104">WhatsApp</a>
</div>
</div>

<div class="wrapper">

<!-- LEFT -->
<div class="card">

<h2>🛍️ Product Select</h2>

<input type="text" id="search" placeholder="Search product...">

<div class="product-grid" id="productList"></div>

<h3>Order Form</h3>

<input type="text" id="product" placeholder="Selected Product" readonly>

<label>Quantity</label>
<input type="number" id="qty" value="1" min="1">

<label>Delivery</label>
<select id="delivery">
<option value="70">Inside Dhaka (70৳)</option>
<option value="130">Outside Dhaka (130৳)</option>
</select>

<label>Name</label>
<input type="text" id="name">

<label>Phone</label>
<input type="tel" id="phone">

<label>Address</label>
<input type="text" id="address">

<button onclick="submitOrder()">Order Now</button>

</div>

<!-- RIGHT -->
<div class="card">

<h2>📦 Summary</h2>

<div class="summary" id="summary"></div>

<div class="total">
💰 Total: <span id="total">0</span>৳
</div>

</div>

</div>

<script>

// PRODUCTS (ADD MORE HERE)
const products = [
{name:"Drop Shoulder- Black", price:350, img:"https://i.postimg.cc/GtDfQfwp/Black-(21).jpg"},
{name:"Drop Shoulder- White", price:350, img:"https://i.postimg.cc/fWS1DV39/White-(22).jpg"},
{name:"Drop Shoulder- Cyan", price:350, img:"https://i.postimg.cc/D0GNgNkZ/Cyan-(23).jpg"},
{name:"Drop Shoulder- Biscuit", price:350, img:"https://i.postimg.cc/dQZgwh7C/Biscuit-(24)-Hd.jpg"}
];

let selected = null;

// render products
function render(list){
let box = document.getElementById("productList");
box.innerHTML="";

list.forEach(p=>{
box.innerHTML += `
<div class="product" onclick="selectProduct('${p.name}')">
<img src="${p.img}">
<div>
<b>${p.name}</b><br>
৳${p.price}
</div>
</div>`;
});
}
render(products);

// search
document.getElementById("search").addEventListener("input",e=>{
let val = e.target.value.toLowerCase();
render(products.filter(p=>p.name.toLowerCase().includes(val)));
});

// select product (SAFE)
function selectProduct(name){

selected = products.find(p=>p.name === name);

document.getElementById("product").value = selected.name;

document.querySelectorAll(".product").forEach(el=>{
el.classList.remove("active");
if(el.innerText.includes(name)){
el.classList.add("active");
}
});

update();
}

// update summary
function update(){

if(!selected) return;

let qty = parseInt(document.getElementById("qty").value || 1);
let delivery = parseInt(document.getElementById("delivery").value);

let subtotal = selected.price * qty;
let total = subtotal + delivery;

document.getElementById("summary").innerHTML = `
Product: <b>${selected.name}</b><br>
Price: ৳${selected.price}<br>
Qty: ${qty}<br>
Subtotal: ৳${subtotal}<br>
Delivery: ৳${delivery}
`;

document.getElementById("total").innerText = total;
}

// live update
document.querySelectorAll("input,select").forEach(el=>{
el.addEventListener("input",update);
});

// SUBMIT ORDER
function submitOrder(){

if(!selected){
alert("Select a product");
return;
}

let qty = document.getElementById("qty").value;
let delivery = document.getElementById("delivery").value;
let total = document.getElementById("total").innerText;

let data = {
product:selected.name,
price:selected.price,
qty,
delivery,
name:document.getElementById("name").value,
phone:document.getElementById("phone").value,
address:document.getElementById("address").value,
total,
date:new Date().toLocaleString()
};

// GOOGLE SHEET (FIXED)
fetch("https://script.google.com/macros/s/AKfycbzhi6l0hQQoGZ6ztA8xnKK_JxkUKYgTyvvHCyGp5zHZrd-0umUFXXpXhdJCs5LsjPdm/exec", {
method:"POST",
body:JSON.stringify(data),
headers:{
"Content-Type":"text/plain"
}
});

// WhatsApp
setTimeout(()=>{
window.open(`https://wa.me/8801575849104?text=Order:%0A${selected.name}%0AQty:${qty}%0ATotal:${total}`);
},300);

// redirect
setTimeout(()=>{
window.location.href="https://azimm7337-cmyk.github.io/NexabonFashion/thanks.html";
},800);

}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Collections | Nexabonfashion</title>
    <script src="https://tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        @import url('https://googleapis.com');
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fdfbf7; color: #1a1a1a; margin: 0; }
        
        /* Collection Hover Effect */
        .collection-item img { transition: transform 1.5s cubic-bezier(0.19, 1, 0.22, 1); }
        .collection-item:hover img { transform: scale(1.1); }
        
        .overlay-text {
            background: linear-gradient(to top, rgba(0,0,0,0.4), transparent);
        }
    </style>
</head>
<body>

    <!-- Nav -->
    <nav class="bg-[#fdfbf7]/90 backdrop-blur-md sticky top-0 z-50 border-b border-[#eee5d9] py-6 px-8">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="https://azimm7337-cmyk.github.io/NexabonFashion/homepage.html" class="text-[10px] font-bold tracking-[3px] uppercase hover:text-[#c4a484] transition">← Back Home</a>
            <div class="text-xl font-black tracking-[5px] uppercase">NEXABON</div>
            <div class="w-20"></div>
        </div>
    </nav>

    <!-- Header Section -->
    <header class="max-w-7xl mx-auto pt-20 pb-16 px-8 text-center">
        <h1 class="text-4xl md:text-5xl font-extrabold uppercase tracking-[10px] mb-4">Collections</h1>
        <p class="text-[10px] uppercase tracking-[4px] text-gray-400 font-bold">Curated Styles for the Modern Generation</p>
    </header>

    <!-- Collections Grid -->
    <section class="max-w-7xl mx-auto py-10 px-8 mb-24">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-12">
            
            <!-- Collection Item 1 -->
            <div class="collection-item relative h-[500px] overflow-hidden group cursor-pointer">
                <img src="https://unsplash.com" class="w-full h-full object-cover">
                <div class="absolute inset-0 overlay-text flex flex-col justify-end p-10 text-white">
                    <span class="text-[10px] uppercase tracking-[4px] font-bold mb-2">Premium Fabric</span>
                    <h2 class="text-3xl font-black uppercase tracking-[5px] mb-6">Waffle Knit Series</h2>
                    <a href="https://azimm7337-cmyk.github.io/NexabonFashion/index.html" target="_blank" class="w-fit bg-white text-black px-8 py-3 text-[10px] font-bold uppercase tracking-[2px] hover:bg-black hover:text-white transition">Explore Now</a>
                </div>
            </div>

            <!-- Collection Item 2 -->
            <div class="collection-item relative h-[500px] overflow-hidden group cursor-pointer">
                <img src="https://unsplash.com" class="w-full h-full object-cover">
                <div class="absolute inset-0 overlay-text flex flex-col justify-end p-10 text-white">
                    <span class="text-[10px] uppercase tracking-[4px] font-bold mb-2">New Silhouette</span>
                    <h2 class="text-3xl font-black uppercase tracking-[5px] mb-6">Drop Shoulder Tee</h2>
                    <a href="https://azimm7337-cmyk.github.io/NexabonFashion/index.html" target="_blank" class="w-fit bg-white text-black px-8 py-3 text-[10px] font-bold uppercase tracking-[2px] hover:bg-black hover:text-white transition">Explore Now</a>
                </div>
            </div>

            <!-- Collection Item 3 (Full Width Optional) -->
            <div class="collection-item relative h-[400px] md:col-span-2 overflow-hidden group cursor-pointer">
                <img src="https://unsplash.com" class="w-full h-full object-cover">
                <div class="absolute inset-0 overlay-text flex flex-col justify-end p-10 text-white text-center items-center">
                    <h2 class="text-4xl font-black uppercase tracking-[8px] mb-6">Minimalist Essentials</h2>
                    <a href="https://azimm7337-cmyk.github.io/NexabonFashion/index.html" target="_blank" class="w-fit bg-white text-black px-10 py-4 text-[10px] font-bold uppercase tracking-[2px] hover:bg-black hover:text-white transition">Shop All Collections</a>
                </div>
            </div>

        </div>
    </section>

    <!-- Footer --><p></p>
    <footer class="border-t border-[#eee5d9] py-12 text-center text-gray-400 text-[9px] tracking-[3px] uppercase bg-[#f4f1ea]">
        &copy; 2026 NEXABON FASHION BANGLADESH | ALL RIGHTS RESERVED
    </footer>

</body>
</html>
